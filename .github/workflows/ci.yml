name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + typecheck + test + size
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build design tokens
        run: yarn build:tokens

      - name: Verify tokens/build is up to date
        run: |
          if [[ -n "$(git status --porcelain tokens/build/)" ]]; then
              echo "::error::tokens/build is stale — commit regenerated outputs."
              git --no-pager diff tokens/build/
              exit 1
          fi

      - name: Biome check (lint + format)
        run: yarn biome check .

      - name: ESLint (react-native rules)
        run: yarn eslint .

      - name: TypeScript
        run: yarn typecheck

      - name: Tests
        run: yarn test

      - name: Size limit
        run: yarn size
