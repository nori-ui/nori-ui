name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + typecheck + test + size
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build design tokens
        run: yarn build:tokens

      - name: Build UI library
        # apps/docs's typecheck/test runs generate-bundle-sizes.mjs, which
        # esbuild-bundles each component import from @nori-ui/core. Core's
        # exports map points at dist/, so the dist must exist before docs
        # runs anything that touches that script.
        run: yarn build:ui

      - name: Build MCP package
        # apps/docs imports @nori-ui/mcp at type-check time; its exports
        # also point at dist/.
        run: yarn workspace @nori-ui/mcp build

      - name: Verify tokens/build is up to date
        run: |
          if [[ -n "$(git status --porcelain packages/tokens/build/)" ]]; then
              echo "::error::tokens/build is stale — commit regenerated outputs."
              git --no-pager diff packages/tokens/build/
              exit 1
          fi

      - name: Biome check (lint + format)
        run: yarn biome check .

      - name: ESLint (react-native rules)
        run: yarn eslint .

      - name: TypeScript
        run: yarn typecheck

      - name: Tests
        run: yarn test

      - name: Size limit
        run: yarn size

  e2e-web:
    name: playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build design tokens
        run: yarn build:tokens

      - name: Build UI library
        # The docs server (started by the e2e suite) generates bundle-size
        # data from @nori-ui/core's dist exports map.
        run: yarn build:ui

      - name: Build MCP package
        # apps/docs imports @nori-ui/mcp at type-check time.
        run: yarn workspace @nori-ui/mcp build

      - name: Install Playwright browsers
        run: yarn e2e:browsers

      - name: Run Playwright tests
        run: yarn test:e2e:web

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/web/playwright-report/
          retention-days: 7

  docs-build:
    name: docs build + mcp eval
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build design tokens
        run: yarn build:tokens

      - name: Build UI library
        # Required by apps/docs's generate-bundle-sizes.mjs (resolves
        # @nori-ui/core via its dist/ exports map).
        run: yarn build:ui

      - name: Build MCP package
        # apps/docs imports @nori-ui/mcp at type-check time.
        run: yarn workspace @nori-ui/mcp build

      - name: Build docs
        run: yarn build:docs

      - name: Start docs server and run MCP eval
        run: |
          yarn dev:docs &
          DOCS_PID=$!
          # Wait for the docs server to respond
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/llms.txt > /dev/null; then
              echo "docs up after ${i}s"
              break
            fi
            sleep 1
          done
          MCP_BASE_URL=http://localhost:3000 yarn node --import tsx apps/docs/eval/run-eval.ts
          EVAL_EXIT=$?
          kill $DOCS_PID || true
          exit $EVAL_EXIT

  tier-matrix:
    name: tests @ expo sdk ${{ matrix.tier }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - tier: "current (55)"
            expo: "~55.0.0"
            rn: "0.83.0"
            react: "^19"
          # When SDK 56 ships, add:
          # - tier: "maintained (55)"
          #   expo: "~55.0.0"
          #   rn: "0.83.0"
          #   react: "^19"
          # - tier: "current (56)"
          #   expo: "~56.0.0"
          #   rn: "0.84.0"   # or whatever 56 pairs with
          #   react: "^19"
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --immutable
      - run: yarn build:tokens
      - name: Override playground-native Expo/RN versions for tier
        env:
          TIER_EXPO: ${{ matrix.expo }}
          TIER_RN: ${{ matrix.rn }}
          TIER_REACT: ${{ matrix.react }}
        run: |
          jq --arg e "$TIER_EXPO" --arg r "$TIER_RN" --arg k "$TIER_REACT" '
            .dependencies.expo = $e |
            .dependencies["react-native"] = $r |
            .dependencies.react = $k
          ' apps/playground-native/package.json > /tmp/pkg.json
          mv /tmp/pkg.json apps/playground-native/package.json
          # CI defaults yarn to immutable — but we just rewrote package.json
          # to swap the Expo/RN/React versions for this tier, so the lockfile
          # MUST be regenerated. Override the immutable default for this step.
          YARN_ENABLE_IMMUTABLE_INSTALLS=false yarn install
      # Build core + mcp before typecheck/test — apps/docs's
      # generate-bundle-sizes script imports from @nori-ui/core's dist
      # exports, and apps/docs's app/mcp/route.ts imports @nori-ui/mcp.
      - run: yarn build:ui
      - run: yarn workspace @nori-ui/mcp build
      - run: yarn typecheck
      - run: yarn test
