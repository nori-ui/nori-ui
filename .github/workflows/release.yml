name: release

on:
  push:
    branches: [main, next]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release to npm (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - run: corepack enable
      # Intentionally NO `registry-url` here: passing it makes
      # `actions/setup-node` write `~/.npmrc` containing
      #   //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
      # With `NODE_AUTH_TOKEN` unset (the whole point of OIDC trusted
      # publishing), npm sees that `_authToken` line, treats the empty
      # string as a configured token, and skips the OIDC handshake — which
      # is what produced the "invalid token" failures.
      #
      # Node 24 ships npm 11.x, which has native OIDC trusted-publishing
      # support. Node 22 ships npm 10.x and would need a manual
      # `npm install -g npm@latest` step.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn

      - run: yarn install --immutable

      # Belt-and-braces guard: surface a clear error if anything in the
      # chain regresses to token auth or an OIDC-incapable npm.
      - name: Verify OIDC publish prerequisites
        # `ACTIONS_ID_TOKEN_REQUEST_URL` / `_TOKEN` are runtime env vars
        # injected by the runner when `id-token: write` is granted. They
        # are NOT accessible via `${{ env.X }}` workflow expressions —
        # those only see job/step `env:` blocks. Read them directly from
        # the shell instead.
        run: |
          set -e
          NPM_VERSION="$(npm --version)"
          echo "npm $NPM_VERSION"
          node -e "const v=process.argv[1].split('.').map(Number);if(v[0]<11||(v[0]===11&&v[1]<5)||(v[0]===11&&v[1]===5&&v[2]<1)){console.error('npm too old for OIDC trusted publishing (need >= 11.5.1)');process.exit(1);}" "$NPM_VERSION"
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
            echo "OIDC ID-token request URL is missing — id-token: write is not granted, or the runtime env didn't expose it"; exit 1
          fi
          AUTH_LINES="$(grep -h '_authToken\|_password' ~/.npmrc /github/home/.npmrc 2>/dev/null || true)"
          if [ -n "$AUTH_LINES" ]; then
            echo "Found stale auth in .npmrc — would override OIDC:"; echo "$AUTH_LINES"; exit 1
          fi
          echo "All OIDC prerequisites OK."

      - run: yarn build:tokens
      - run: yarn build:ui

      # The MCP package's CLI bundle embeds the docs corpus snapshotted
      # by this script. Run it before building the MCP package so the
      # generated JSON exists in the workspace.
      - name: Snapshot docs corpus for MCP package
        run: node apps/docs/scripts/generate-mcp-data.mjs

      - run: yarn workspace @nori-ui/mcp build

      # Strip the `workspace:` protocol from any deps in the about-to-publish
      # package.json files. npm 11 rejects `workspace:*` with EUNSUPPORTEDPROTOCOL
      # during `npm version` (semantic-release's prepare step). The deps that
      # use this protocol here are all private build-time-only packages
      # (e.g. `@nori-ui/tokens` is bundled into core's dist by tsup and never
      # installed by consumers) — replacing the spec with "*" lets npm parse
      # the package.json without changing what consumers receive at install
      # time. Done on the runner only; never committed.
      - name: Substitute workspace: protocol in publishable packages
        run: |
          node -e '
            const fs = require("fs");
            const pkgs = ["packages/core/package.json", "packages/mcp/package.json"];
            for (const p of pkgs) {
              const j = JSON.parse(fs.readFileSync(p, "utf8"));
              for (const k of ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]) {
                if (!j[k]) continue;
                for (const [name, spec] of Object.entries(j[k])) {
                  if (typeof spec === "string" && spec.startsWith("workspace:")) {
                    j[k][name] = "*";
                    console.log("rewrote", p, k + "." + name, ":", spec, "→", "*");
                  }
                }
              }
              fs.writeFileSync(p, JSON.stringify(j, null, 4) + "\n");
            }
          '

      - name: Verify build artifacts
        run: |
          test -f packages/core/dist/index.js
          test -f packages/core/dist/index.cjs
          test -f packages/core/dist/index.d.ts
          test -f packages/mcp/dist/cli.js
          test -f packages/mcp/dist/index.js
          test -f packages/mcp/dist/index.d.ts

      # semantic-release runs version bump + publish + changelog + github release.
      # `npm publish` is invoked by @semantic-release/npm. With:
      #   - id-token: write granted (above)
      #   - npmjs.org "Trusted publisher" configured for this repo + this
      #     workflow file (release.yml on main/next)
      #   - npm 11.5.1+ on PATH (Node 24 ships it natively)
      #   - no `_authToken` in any .npmrc (verified above)
      # …`npm publish` performs the OIDC handshake automatically. No
      # NPM_TOKEN secret is used.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: yarn semantic-release
